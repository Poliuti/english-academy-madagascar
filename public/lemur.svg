<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130">
  <!-- Ring-tailed lemur — cartoon style -->

  <!-- Tail (behind everything) — black and white stripes -->
  <path d="M62 98 Q92 90 100 68 Q106 48 90 36 Q78 28 72 42 Q68 54 80 58 Q92 62 88 78 Q84 90 66 95"
        fill="none" stroke="#2a2a2a" stroke-width="9" stroke-linecap="round"/>
  <path d="M62 98 Q92 90 100 68 Q106 48 90 36 Q78 28 72 42 Q68 54 80 58 Q92 62 88 78 Q84 90 66 95"
        fill="none" stroke="#f0f0f0" stroke-width="9" stroke-linecap="round" stroke-dasharray="10 10"/>

  <!-- Body -->
  <ellipse cx="52" cy="82" rx="22" ry="24" fill="#a0a0a0"/>

  <!-- Head -->
  <circle cx="52" cy="48" r="24" fill="#b2b2b2"/>

  <!-- White face patch -->
  <ellipse cx="52" cy="52" rx="15" ry="13" fill="#f0f0f0"/>

  <!-- Left ear -->
  <ellipse cx="31" cy="28" rx="9" ry="11" fill="#b2b2b2" transform="rotate(-20 31 28)"/>
  <ellipse cx="31" cy="28" rx="5" ry="7" fill="#fff" transform="rotate(-20 31 28)"/>

  <!-- Right ear -->
  <ellipse cx="73" cy="28" rx="9" ry="11" fill="#b2b2b2" transform="rotate(20 73 28)"/>
  <ellipse cx="73" cy="28" rx="5" ry="7" fill="#fff" transform="rotate(20 73 28)"/>

  <!-- Dark eye patches -->
  <ellipse cx="43" cy="44" rx="9" ry="8" fill="#2a2a2a"/>
  <ellipse cx="61" cy="44" rx="9" ry="8" fill="#2a2a2a"/>

  <!-- Eyes — amber/orange (lemur's most iconic feature) -->
  <circle cx="43" cy="44" r="6.5" fill="#E65100"/>
  <circle cx="61" cy="44" r="6.5" fill="#E65100"/>

  <!-- Pupils -->
  <circle cx="43" cy="44" r="4" fill="#111"/>
  <circle cx="61" cy="44" r="4" fill="#111"/>

  <!-- Eye shine -->
  <circle cx="44.8" cy="42.2" r="1.5" fill="#fff"/>
  <circle cx="62.8" cy="42.2" r="1.5" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="52" cy="55" rx="3.5" ry="2.5" fill="#555"/>

  <!-- Mouth -->
  <path d="M48 59 Q52 62 56 59" stroke="#666" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Arms -->
  <ellipse cx="30" cy="84" rx="9" ry="19" fill="#a0a0a0" transform="rotate(-8 30 84)"/>
  <ellipse cx="74" cy="84" rx="9" ry="19" fill="#a0a0a0" transform="rotate(8 74 84)"/>

  <!-- Belly (lighter) -->
  <ellipse cx="52" cy="85" rx="13" ry="16" fill="#cccccc"/>
</svg>
