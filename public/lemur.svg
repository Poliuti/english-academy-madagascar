<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">

  <!-- ── CODA striata (ring-tailed lemur) – dietro tutto ── -->
  <!-- fondo scuro -->
  <path d="M58 118 C58 118 45 108 42 90 C39 72 50 60 62 62 C74 64 80 76 74 88 C70 96 60 94 58 84 C56 74 65 68 72 72"
        fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- strisce bianche alternate -->
  <path d="M58 118 C58 118 45 108 42 90 C39 72 50 60 62 62 C74 64 80 76 74 88 C70 96 60 94 58 84 C56 74 65 68 72 72"
        fill="none" stroke="#f5f5f5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="11 11" stroke-dashoffset="0"/>

  <!-- ── CORPO ── -->
  <ellipse cx="54" cy="100" rx="24" ry="26" fill="#9e9e9e" stroke="#555" stroke-width="1.5"/>

  <!-- ── TESTA ── -->
  <circle cx="54" cy="58" r="28" fill="#bdbdbd" stroke="#666" stroke-width="1.5"/>

  <!-- ── ORECCHIE ── -->
  <ellipse cx="30" cy="35" rx="10" ry="13" fill="#bdbdbd" stroke="#666" stroke-width="1.5" transform="rotate(-25 30 35)"/>
  <ellipse cx="30" cy="35" rx="5.5" ry="8"  fill="#ffffff" transform="rotate(-25 30 35)"/>
  <ellipse cx="78" cy="35" rx="10" ry="13" fill="#bdbdbd" stroke="#666" stroke-width="1.5" transform="rotate(25 78 35)"/>
  <ellipse cx="78" cy="35" rx="5.5" ry="8"  fill="#ffffff" transform="rotate(25 78 35)"/>

  <!-- ── MACCHIE NERE OCCHI ── -->
  <ellipse cx="43" cy="54" rx="11" ry="10" fill="#212121"/>
  <ellipse cx="65" cy="54" rx="11" ry="10" fill="#212121"/>

  <!-- ── PATCH BIANCA VISO ── -->
  <ellipse cx="54" cy="62" rx="17" ry="14" fill="#f5f5f5"/>

  <!-- ── OCCHI (ambra/arancio – tipici del lemure) ── -->
  <circle cx="43" cy="53" r="7.5" fill="#E65100"/>
  <circle cx="65" cy="53" r="7.5" fill="#E65100"/>
  <!-- pupille -->
  <circle cx="43" cy="53" r="4.5" fill="#111"/>
  <circle cx="65" cy="53" r="4.5" fill="#111"/>
  <!-- brillino -->
  <circle cx="45" cy="51" r="1.8" fill="#fff"/>
  <circle cx="67" cy="51" r="1.8" fill="#fff"/>

  <!-- ── MUSO SCURO (triangolare – caratteristico) ── -->
  <ellipse cx="54" cy="67" rx="8" ry="6" fill="#757575"/>
  <!-- naso -->
  <ellipse cx="54" cy="65" rx="3" ry="2.2" fill="#424242"/>
  <!-- bocca -->
  <path d="M50 70 Q54 74 58 70" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ── BRACCIA ── -->
  <ellipse cx="31" cy="102" rx="10" ry="21" fill="#9e9e9e" stroke="#555" stroke-width="1.2" transform="rotate(-10 31 102)"/>
  <ellipse cx="77" cy="102" rx="10" ry="21" fill="#9e9e9e" stroke="#555" stroke-width="1.2" transform="rotate(10 77 102)"/>

  <!-- ── PANCIA più chiara ── -->
  <ellipse cx="54" cy="104" rx="14" ry="17" fill="#d6d6d6"/>

</svg>
